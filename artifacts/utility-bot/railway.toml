# Railway configuration for AeroX AIO V3 utility bot.
# Docs: https://docs.railway.app/reference/config-as-code
#
# Deploy steps (do these once in Railway dashboard):
#   1. Create a new service → "Deploy from GitHub repo"
#   2. In service settings → "Root Directory" → set to: artifacts/utility-bot
#   3. Add all variables from .env in the "Variables" tab:
#        TOKEN, CLIENT_ID, OWNER_IDS
#        LAVALINK_HOST, LAVALINK_PORT, LAVALINK_PASSWORD, LAVALINK_SECURE
#   4. Deploy — the bot will start automatically

[build]
builder = "nixpacks"

[deploy]
startCommand = "node src/shard.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
