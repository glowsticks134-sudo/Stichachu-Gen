# Railway configuration — runs the email bot.
# Root Directory in Railway dashboard must be left EMPTY (repo root).
#
# Variables to set in Railway:
#   Email bot: TOKEN_1, CLIENT_1
#              (TOKEN_2, CLIENT_2, ... for additional bots)

[build]
builder = "nixpacks"

[deploy]
startCommand = "node start.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
